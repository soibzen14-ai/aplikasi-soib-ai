<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soib Ai - Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-[#0a0514] text-white min-h-screen">
  <header class="p-6 flex items-center justify-center gap-2 border-b border-white/5">
    <i data-lucide="zap" class="text-cyan-400"></i>
    <h1 class="text-xl font-black tracking-widest text-cyan-400">SOIB AI</h1>
  </header>

  <main class="max-w-xl mx-auto px-6 py-10 flex flex-col gap-6">
    <div class="glass p-8 rounded-[2.5rem] flex flex-col gap-6 shadow-2xl animate-[fadeIn_0.5s_ease-out]">
      
      <div id="dropzone" class="relative h-44 bg-black/40 border-2 border-dashed border-white/10 rounded-3xl flex flex-col items-center justify-center cursor-pointer overflow-hidden hover:bg-black/60 transition-all" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" class="hidden" accept="image/*">
        <div id="placeholder" class="text-center">
          <i data-lucide="image-plus" class="w-12 h-12 text-cyan-500 mx-auto mb-2"></i>
          <p class="text-sm font-bold text-gray-400">Pilih Foto Anak / Foto Dasar</p>
        </div>
        <img id="preview" class="hidden absolute inset-0 w-full h-full object-contain p-2">
      </div>

      <div class="space-y-2">
        <label class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-2">Perintah Mas Sohib:</label>
        <input type="text" id="prompt" placeholder="Contoh: Naik kuda di taman bunga..." class="w-full bg-black/60 border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:ring-2 focus:ring-cyan-500 transition-all">
      </div>
      
      <button id="go" class="w-full py-5 bg-gradient-to-r from-cyan-600 to-purple-600 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">GENERATE IMAGE</button>
    </div>

    <div id="load" class="hidden text-center py-10">
      <div class="w-12 h-12 border-4 border-t-cyan-400 border-white/10 rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-cyan-400 font-bold animate-pulse">MEMPROSES KARYA MAS SOHIB...</p>
    </div>

    <div id="result" class="hidden space-y-4 animate-[fadeIn_0.5s_ease-out]">
      <div class="glass p-2 rounded-[2rem] overflow-hidden">
        <img id="resImg" class="w-full rounded-[1.5rem] shadow-2xl">
      </div>
      <div class="flex gap-2">
        <button onclick="downloadImg()" class="flex-1 py-4 bg-cyan-600 rounded-xl font-bold flex items-center justify-center gap-2">
          <i data-lucide="download" class="w-5 h-5"></i> SIMPAN
        </button>
        <button onclick="location.reload()" class="px-6 py-4 bg-white/5 rounded-xl font-bold">RESET</button>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();
    
    // KUNCI SAKTI MAS SOHIB SUDAH TERPASANG DI SINI:
    const apiKey = "AIzaSyDDalYexDcYMj_Iwdq9RxLZdxCkiUfxUNQ"; 

    const fInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const placeholder = document.getElementById('placeholder');
    let base64Data = "";
    
    fInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => { 
          base64Data = ev.target.result.split(',')[1];
          preview.src = ev.target.result; 
          preview.classList.remove('hidden'); 
          placeholder.classList.add('hidden');
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('go').addEventListener('click', async () => {
      const pText = document.getElementById('prompt').value.trim();
      if(!pText) return alert("Ketik perintahnya dulu ya Mas Sohib!");
      
      document.getElementById('load').classList.remove('hidden');
      document.getElementById('result').classList.add('hidden');

      try {
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        let parts = [{ text: "Berdasarkan foto yang saya berikan, buatkan gambar realistis sesuai perintah ini: " + pText }];
        
        if(base64Data) {
          parts.push({ inlineData: { mimeType: "image/jpeg", data: base64Data } });
        }

        const res = await fetch(url, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contents: [{ parts }], generationConfig: { responseModalities: ["IMAGE"] } }) 
        });
        
        const data = await res.json();
        if(data.error) throw new Error(data.error.message);
        
        const img = data.candidates[0].content.parts.find(p => p.inlineData);
        if(!img) throw new Error("AI sedang lelah, coba perintah lain.");

        document.getElementById('resImg').src = `data:${img.inlineData.mimeType};base64,${img.inlineData.data}`;
        document.getElementById('result').classList.remove('hidden');
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      } catch (e) {
        alert("Waduh, ada kendala: " + e.message);
      } finally {
        document.getElementById('load').classList.add('hidden');
      }
    });

    window.downloadImg = () => { 
      const a = document.createElement('a'); 
      a.href = document.getElementById('resImg').src; 
      a.download = "karya-soib-ai.png"; 
      a.click(); 
    }
  </script>
</body>
</html>
