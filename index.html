<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soib Ai - Pembuat Gambar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-[#0a0514] text-white min-h-screen">
  <header class="p-6 flex items-center justify-center gap-2 border-b border-white/5">
    <i data-lucide="zap" class="text-cyan-400"></i>
    <h1 class="text-xl font-black tracking-widest text-cyan-400 uppercase">SOIB AI</h1>
  </header>

  <main class="max-w-xl mx-auto px-6 py-10 flex flex-col gap-6">
    <div class="glass p-8 rounded-[2.5rem] flex flex-col gap-6 shadow-2xl animate-[fadeIn_0.5s_ease-out]">
      
      <div class="space-y-4">
        <label class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-2 text-center block">Mas Sohib mau buat gambar apa?</label>
        <textarea id="prompt" rows="3" placeholder="Contoh: Kuda berlari di pantai saat matahari terbenam, sangat realistis..." class="w-full bg-black/60 border border-white/10 rounded-2xl px-6 py-5 text-white outline-none focus:ring-2 focus:ring-cyan-500 transition-all text-lg"></textarea>
      </div>
      
      <button id="go" class="w-full py-5 bg-gradient-to-r from-cyan-600 to-purple-600 rounded-2xl font-black text-xl shadow-lg active:scale-95 transition-all">BUAT GAMBAR SEKARANG</button>
    </div>

    <div id="load" class="hidden text-center py-10">
      <div class="w-12 h-12 border-4 border-t-cyan-400 border-white/10 rounded-full animate-spin mx-auto mb-4"></div>
      <p class="text-cyan-400 font-bold animate-pulse">SOIB SEDANG MELUKIS...</p>
    </div>

    <div id="result" class="hidden space-y-4 animate-[fadeIn_0.5s_ease-out]">
      <div class="glass p-2 rounded-[2rem] overflow-hidden border-2 border-cyan-500/30">
        <img id="resImg" class="w-full rounded-[1.5rem] shadow-2xl">
      </div>
      <div class="flex gap-2">
        <button onclick="downloadImg()" class="flex-1 py-4 bg-cyan-600 rounded-xl font-bold flex items-center justify-center gap-2">
          <i data-lucide="download" class="w-5 h-5"></i> SIMPAN GAMBAR
        </button>
        <button onclick="location.reload()" class="px-6 py-4 bg-white/5 rounded-xl font-bold">ULANGI</button>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();
    
    const goBtn = document.getElementById('go');
    const resImg = document.getElementById('resImg');
    const loadState = document.getElementById('load');
    const resultArea = document.getElementById('result');

    goBtn.addEventListener('click', () => {
      const pText = document.getElementById('prompt').value.trim();
      if(!pText) return alert("Ketik dulu perintahnya Mas Sohib!");

      loadState.classList.remove('hidden');
      resultArea.classList.add('hidden');

      // Menggunakan Pollinations AI (Gratis, Tanpa API Key, Pasti Berhasil)
      const encodedPrompt = encodeURIComponent(pText);
      const imageUrl = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1080&height=1080&model=flux&nologo=true`;

      // Menunggu gambar selesai dibuat
      const img = new Image();
      img.src = imageUrl;
      img.onload = () => {
        resImg.src = imageUrl;
        loadState.classList.add('hidden');
        resultArea.classList.remove('hidden');
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      };
      img.onerror = () => {
        alert("Waduh, server sedang sibuk Mas. Coba klik lagi!");
        loadState.classList.add('hidden');
      };
    });

    window.downloadImg = async () => {
      const response = await fetch(resImg.src);
      const blob = await response.blob();
      const url = window.URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `soib-ai-${Date.now()}.jpg`;
      a.click();
    }
  </script>
</body>
</html>
