<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soib Ai - Studio Premium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body { background-color: #050505; color: #ffffff; }
    .glass-panel { background: rgba(25, 25, 25, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    .clean-input { background: rgba(10, 10, 10, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); transition: all 0.3s ease; }
    .clean-input:focus { border-color: #22d3ee; box-shadow: 0 0 15px rgba(34, 211, 238, 0.1); outline: none; }
    .btn-primary { background: linear-gradient(135deg, #0891b2 0%, #7c3aed 100%); transition: transform 0.2s, opacity 0.2s; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-primary:hover { opacity: 0.9; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
  </style>
</head>
<body class="min-h-screen flex flex-col items-center pt-16 pb-24 px-6 font-sans antialiased selection:bg-cyan-500/30">

  <header class="mb-12 flex flex-col items-center animate-fade">
    <div class="flex items-center gap-3">
      <i data-lucide="sparkles" class="w-6 h-6 text-cyan-400"></i>
      <h1 class="text-3xl font-light tracking-[0.2em] text-white">SOIB <span class="font-bold text-cyan-400">AI</span></h1>
    </div>
  </header>

  <main class="w-full max-w-lg glass-panel rounded-[2rem] p-8 shadow-2xl animate-fade" style="animation-delay: 0.1s;">
    
    <div id="dropzone" class="relative w-full h-48 clean-input rounded-3xl flex flex-col items-center justify-center cursor-pointer overflow-hidden group mb-8" onclick="document.getElementById('fileInput').click()">
      <input type="file" id="fileInput" class="hidden" accept="image/*">
      
      <div id="placeholder" class="flex flex-col items-center gap-3 transition-transform duration-300 group-hover:scale-105">
        <div class="w-12 h-12 rounded-full bg-white/5 flex items-center justify-center">
          <i data-lucide="image-plus" class="w-6 h-6 text-cyan-400"></i>
        </div>
        <p class="text-xs font-medium tracking-widest text-gray-400 uppercase">Pilih Foto Referensi</p>
      </div>

      <img id="imagePreview" class="hidden absolute inset-0 w-full h-full object-cover opacity-90">
    </div>

    <div class="mb-8">
      <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-[0.2em] mb-3 ml-2">Instruksi Visual</label>
      <textarea id="prompt" rows="2" placeholder="Cth: Duduk di taman bunga, pencahayaan sinematik..." class="w-full clean-input rounded-2xl px-5 py-4 text-sm text-gray-200 placeholder-gray-600 resize-none"></textarea>
    </div>

    <button id="goBtn" class="w-full btn-primary py-4 rounded-2xl font-bold text-sm uppercase tracking-widest text-white shadow-lg flex items-center justify-center gap-2">
      <i data-lucide="wand-2" class="w-4 h-4"></i> Generate Image
    </button>

  </main>

  <div id="loadingState" class="hidden mt-12 flex-col items-center animate-fade">
    <div class="w-10 h-10 border-2 border-white/10 border-t-cyan-400 rounded-full animate-spin mb-4"></div>
    <p class="text-[10px] font-bold text-cyan-400 uppercase tracking-[0.2em] animate-pulse">Memproses AI Gemini...</p>
  </div>

  <div id="resultState" class="hidden mt-12 w-full max-w-lg glass-panel rounded-[2rem] p-4 shadow-2xl animate-fade">
    <img id="resImg" class="w-full rounded-[1.5rem] shadow-inner mb-4">
    <div class="flex gap-3">
      <button onclick="downloadImg()" class="flex-1 clean-input hover:bg-cyan-900/30 py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest text-cyan-400 flex items-center justify-center gap-2">
        <i data-lucide="download" class="w-4 h-4"></i> Simpan
      </button>
      <button onclick="location.reload()" class="px-6 clean-input hover:bg-white/5 py-4 rounded-xl font-bold text-[10px] uppercase tracking-widest text-gray-400">
        Reset
      </button>
    </div>
  </div>

  <script>
    lucide.createIcons();
    
    // PURE GEMINI API KEY
    const apiKey = "AIzaSyDDalYexDcYMj_Iwdq9RxLZdxCkiUfxUNQ"; 

    const fInput = document.getElementById('fileInput');
    const preview = document.getElementById('imagePreview');
    const placeholder = document.getElementById('placeholder');
    let base64Data = "";
    
    fInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => { 
          base64Data = ev.target.result.split(',')[1];
          preview.src = ev.target.result; 
          preview.classList.remove('hidden'); 
          placeholder.classList.add('hidden');
        };
        reader.readAsDataURL(file);
      }
    });

    document.getElementById('goBtn').addEventListener('click', async () => {
      const userPrompt = document.getElementById('prompt').value.trim();
      if(!userPrompt) return;

      document.getElementById('loadingState').classList.remove('hidden');
      document.getElementById('resultState').classList.add('hidden');
      document.getElementById('goBtn').disabled = true;
      document.getElementById('goBtn').style.opacity = '0.5';

      try {
        // Menggunakan model Gemini terbaru
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`;
        
        // SISTEM PENGUNCI WAJAH (Disisipkan ke AI secara otomatis)
        const strictSystemInstruction = "Enabler strict facial consistency mode. prioritize the facial features from the provided reference image for all subsequent generations. maintain the subject's identity accurately while only adapting the pose, lighting, and background Do not alter the core facial structure. User request: " + userPrompt;

        let parts = [{ text: strictSystemInstruction }];
        if(base64Data) {
          parts.push({ inlineData: { mimeType: "image/jpeg", data: base64Data } });
        }

        const bodyPayload = {
          contents: [{ parts }],
          generationConfig: {
            responseModalities: ["IMAGE"]
          }
        };

        const res = await fetch(url, { 
          method: 'POST', 
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(bodyPayload)
        });
        
        const data = await res.json();
        
        if(data.error) {
          throw new Error(data.error.message);
        }

        const imgPart = data.candidates[0].content.parts.find(p => p.inlineData);
        if(!imgPart) throw new Error("Gemini tidak dapat memproses gambar dengan struktur perintah ini.");

        document.getElementById('resImg').src = `data:${imgPart.inlineData.mimeType};base64,${imgPart.inlineData.data}`;
        document.getElementById('resultState').classList.remove('hidden');
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
      } catch (e) {
        alert("Pesan dari Gemini: " + e.message);
      } finally {
        document.getElementById('loadingState').classList.add('hidden');
        document.getElementById('goBtn').disabled = false;
        document.getElementById('goBtn').style.opacity = '1';
      }
    });

    window.downloadImg = () => { 
      const a = document.createElement('a'); 
      a.href = document.getElementById('resImg').src; 
      a.download = "soib-ai-gemini.png"; 
      a.click(); 
    }
  </script>
</body>
</html>
