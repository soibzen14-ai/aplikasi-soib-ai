<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soib Ai - Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @keyframes shimmer { 100% { transform: translateX(50%); } }
    @keyframes scanline {
      0% { top: 0; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shine { 100% { left: 200%; } }
  </style>
</head>
<body class="bg-gradient-to-br from-[#2e1065] via-[#0a0514] to-[#1e0a3c] text-white font-sans min-h-screen relative overflow-x-hidden selection:bg-purple-500/30">
  
  <div class="fixed inset-0 z-0 pointer-events-none">
    <div class="absolute top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-fuchsia-900/20 blur-[120px]"></div>
    <div class="absolute bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-purple-900/30 blur-[120px]"></div>
    <div class="absolute top-[40%] left-[50%] translate-x-[-50%] w-[80%] h-[20%] rounded-full bg-indigo-600/15 blur-[150px]"></div>
  </div>

  <header class="fixed top-0 w-full z-50 bg-black/40 backdrop-blur-xl">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-center">
      <div class="flex items-center gap-2">
        <i data-lucide="zap" class="w-5 h-5 text-cyan-400"></i>
        <h1 class="text-xl font-bold tracking-widest uppercase bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-purple-500">Soib Ai</h1>
      </div>
    </div>
  </header>

  <main class="relative z-10 max-w-5xl mx-auto px-6 pt-28 pb-16 flex flex-col gap-6 items-center">
    <div class="w-full max-w-3xl bg-white/[0.02] rounded-3xl p-6 md:p-8 backdrop-blur-md shadow-2xl flex flex-col gap-8 relative overflow-hidden">
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-3/4 h-1/2 bg-cyan-500/10 blur-[100px] pointer-events-none rounded-full"></div>

      <div class="flex justify-center w-full relative z-10">
        <div class="inline-flex items-center gap-2 px-4 py-2 bg-black/40 rounded-full backdrop-blur-md">
          <i data-lucide="wand-2" class="w-4 h-4 text-purple-400"></i>
          <span class="text-sm font-medium text-gray-300">Mode Aktif: <span id="modeText" class="text-cyan-400 font-bold">Teks ke Gambar AI</span></span>
        </div>
      </div>

      <div id="dropzone" class="relative w-full h-32 transition-all duration-500 flex flex-col items-center justify-center cursor-pointer group" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" class="hidden" multiple accept="image/*">
        <div id="uploadEmptyState" class="relative w-full h-full rounded-2xl bg-[#0a0a0f]/80 backdrop-blur-xl overflow-hidden shadow-inner">
            <div class="relative h-full w-full flex flex-col items-center justify-center gap-3">
              <div class="relative p-3 rounded-full bg-gradient-to-tr from-cyan-900/40 to-purple-900/40 shadow-2xl"><i data-lucide="upload-cloud" class="w-8 h-8 text-cyan-300"></i></div>
              <h3 class="text-lg font-bold text-white tracking-wide">Masukkan Foto</h3>
            </div>
        </div>
        <div id="previewState" class="hidden absolute inset-0 flex flex-col md:flex-row p-1 gap-4 h-full w-full"></div>
      </div>

      <div class="relative w-full z-10">
        <div class="absolute -inset-1 bg-gradient-to-r from-cyan-500/20 to-purple-500/20 rounded-[1.5rem] blur opacity-50"></div>
        <div class="relative">
          <input type="text" id="promptInput" placeholder="Ketik prompt..." class="w-full bg-[#0a0a0f] border-none rounded-2xl pl-6 pr-14 py-5 text-white focus:outline-none focus:ring-2 focus:ring-cyan-500/50 text-lg shadow-inner">
          <i data-lucide="sparkles" id="promptIcon" class="absolute right-6 top-1/2 -translate-y-1/2 w-6 h-6 text-gray-600"></i>
        </div>
      </div>

      <div class="flex gap-4 items-center w-full mt-2 z-10">
        <button id="generateBtn" disabled class="flex-1 flex items-center justify-center gap-3 py-4 rounded-xl font-bold text-lg transition-all group bg-white/5 text-gray-500">
          <span id="btnText">Generate Image</span>
        </button>
        <button id="resetBtn" class="px-8 py-4 bg-[#0a0a0f] rounded-xl font-semibold text-gray-400">Reset</button>
      </div>
    </div>

    <div class="w-full mt-6" id="result-section">
      <div id="loadingState" class="hidden w-full aspect-[21/9] bg-[#0a0a0f] rounded-3xl overflow-hidden relative shadow-2xl flex flex-col items-center justify-center gap-4">
          <p class="text-purple-400 font-medium animate-pulse">Soib sedang bekerja...</p>
      </div>
      <div id="successState" class="hidden w-full flex flex-col gap-4">
        <div class="w-full relative group rounded-3xl overflow-hidden bg-black" onclick="openModal()">
          <img id="resultImage" src="" class="w-full h-auto max-h-[70vh] object-contain">
        </div>
      </div>
    </div>
  </main>

  <div id="imageModal" class="hidden fixed inset-0 z-[100] bg-black/95 backdrop-blur-xl flex-col items-center justify-center p-8" onclick="closeModal()">
    <img id="modalImage" src="" class="max-w-full max-h-[85vh] object-contain rounded-xl">
  </div>

  <script>
    lucide.createIcons();
    const apiKey = ""; 
    let uploadedFiles = [];
    let finalImageBase64 = null;

    const fileInput = document.getElementById('fileInput');
    const promptInput = document.getElementById('promptInput');
    const generateBtn = document.getElementById('generateBtn');

    fileInput.addEventListener('change', (e) => { uploadedFiles = Array.from(e.target.files).slice(0, 2); updateUI(); });
    promptInput.addEventListener('input', updateUI);

    function updateUI() {
        const hasInput = uploadedFiles.length > 0 || promptInput.value.trim().length > 0;
        generateBtn.disabled = !hasInput;
        generateBtn.className = hasInput ? "flex-1 flex items-center justify-center gap-3 py-4 rounded-xl font-bold text-lg bg-gradient-to-r from-cyan-600 to-purple-600 text-white" : "flex-1 flex items-center justify-center gap-3 py-4 rounded-xl font-bold text-lg bg-white/5 text-gray-500";
        
        if (uploadedFiles.length > 0) {
            document.getElementById('dropzone').classList.replace('h-32', 'h-48');
            document.getElementById('uploadEmptyState').classList.add('hidden');
            document.getElementById('previewState').classList.remove('hidden');
            document.getElementById('previewState').innerHTML = uploadedFiles.map(f => `<div class="relative flex-1 h-full rounded-2xl overflow-hidden bg-black"><img src="${URL.createObjectURL(f)}" class="w-full h-full object-cover opacity-90"></div>`).join('');
        } else {
            document.getElementById('dropzone').classList.replace('h-48', 'h-32');
            document.getElementById('uploadEmptyState').classList.remove('hidden');
            document.getElementById('previewState').classList.add('hidden');
        }
    }

    generateBtn.addEventListener('click', () => {
        document.getElementById('loadingState').classList.remove('hidden');
        setTimeout(() => {
            finalImageBase64 = `https://picsum.photos/seed/${Math.random()}/1200/800`;
            document.getElementById('resultImage').src = finalImageBase64;
            document.getElementById('modalImage').src = finalImageBase64;
            document.getElementById('loadingState').classList.add('hidden');
            document.getElementById('successState').classList.remove('hidden');
        }, 2000);
    });

    window.openModal = () => document.getElementById('imageModal').style.display = 'flex';
    window.closeModal = () => document.getElementById('imageModal').style.display = 'none';
    document.getElementById('resetBtn').addEventListener('click', () => location.reload());
  </script>
</body>
</html>
