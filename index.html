<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soib Ai - Studio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-gradient-to-br from-[#2e1065] via-[#0a0514] to-[#1e0a3c] text-white min-h-screen">
  <header class="p-6 text-center">
    <h1 class="text-xl font-bold tracking-widest text-cyan-400">SOIB AI</h1>
  </header>
  <main class="max-w-xl mx-auto px-6 py-10 flex flex-col gap-6">
    <div class="bg-white/5 p-6 rounded-3xl backdrop-blur-xl shadow-2xl flex flex-col gap-6">
      <div id="dropzone" class="h-32 border-2 border-dashed border-white/20 rounded-2xl flex items-center justify-center cursor-pointer" onclick="document.getElementById('fileInput').click()">
        <input type="file" id="fileInput" class="hidden" multiple accept="image/*">
        <p id="uploadText" class="text-sm text-gray-400">Masukkan Foto (Opsional)</p>
      </div>
      <input type="text" id="promptInput" placeholder="Ketik perintah (contoh: Gambar Kuda)" class="w-full bg-black/40 border-none rounded-xl px-4 py-4 text-white outline-none ring-1 ring-white/10 focus:ring-cyan-500">
      <div id="errorMsg" class="hidden p-3 bg-red-500/20 text-red-400 text-xs rounded-xl"></div>
      <button id="generateBtn" class="w-full py-4 bg-gradient-to-r from-cyan-600 to-purple-600 rounded-xl font-bold active:scale-95 transition-all">Generate Image</button>
    </div>
    <div id="loadingState" class="hidden text-center text-cyan-400 animate-pulse">Sedang memproses...</div>
    <div id="successState" class="hidden flex flex-col gap-4">
      <img id="resultImage" class="w-full rounded-2xl shadow-2xl border border-white/10">
      <button onclick="downloadImg()" class="py-3 bg-white/10 rounded-xl font-bold">Unduh Gambar</button>
    </div>
  </main>
  <script>
    lucide.createIcons();
    const apiKey = "AIzaSyC7AOC1PerV_ddO08eAqJuFq6AthhsO-94";
    const fileInput = document.getElementById('fileInput');
    const generateBtn = document.getElementById('generateBtn');
    let uploadedFiles = [];

    fileInput.addEventListener('change', (e) => {
      uploadedFiles = Array.from(e.target.files);
      document.getElementById('uploadText').innerText = "Foto Terpilih!";
    });

    const fileToB64 = (f) => new Promise(res => { const r = new FileReader(); r.onload = () => res(r.result.split(',')[1]); r.readAsDataURL(f); });

    generateBtn.addEventListener('click', async () => {
      if(!document.getElementById('promptInput').value) return alert("Ketik perintah dulu!");
      document.getElementById('loadingState').classList.remove('hidden');
      document.getElementById('successState').classList.add('hidden');
      document.getElementById('errorMsg').classList.add('hidden');

      try {
        // GANTI MODEL KE 1.5 FLASH UNTUK KESTABILAN MODALITAS IMAGE
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;
        let parts = [{ text: "Buatkan gambar realistis berdasarkan: " + document.getElementById('promptInput').value }];
        for(let f of uploadedFiles) parts.push({ inlineData: { mimeType: f.type, data: await fileToB64(f) } });

        const res = await fetch(url, { 
          method: 'POST', 
          body: JSON.stringify({ contents: [{ parts }], generationConfig: { responseModalities: ["IMAGE"] } }) 
        });
        const data = await res.json();
        if(data.error) throw new Error(data.error.message);
        const img = data.candidates[0].content.parts.find(p => p.inlineData);
        document.getElementById('resultImage').src = `data:${img.inlineData.mimeType};base64,${img.inlineData.data}`;
        document.getElementById('successState').classList.remove('hidden');
      } catch (e) {
        document.getElementById('errorMsg').innerText = "Waduh: " + e.message;
        document.getElementById('errorMsg').classList.remove('hidden');
      } finally {
        document.getElementById('loadingState').classList.add('hidden');
      }
    });
    window.downloadImg = () => { const a = document.createElement('a'); a.href = document.getElementById('resultImage').src; a.download = "soib-ai.png"; a.click(); }
  </script>
</body>
</html>
